name: Generate Demo Site
on:
  workflow_dispatch:
    inputs:
      company_slug:
        description: 'Folder name for the prospect (e.g., vox-restoration)'
        required: true
      target_url:
        description: 'The URL of the prospect website to iframe'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Demo Folder and File
        run: |
          mkdir -p ${{ github.event.inputs.company_slug }}
          cp template.html ${{ github.event.inputs.company_slug }}/index.html
          # Safely swap out the placeholder with the actual website link
          sed -i 's|REG_TARGET_URL|${{ github.event.inputs.target_url }}|g' ${{ github.event.inputs.company_slug }}/index.html

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Demo Build Bot"
          git config --global user.email "bot@alentopro.com"
          git add .
          git commit -m "Automated demo build for ${{ github.event.inputs.company_slug }}"
          git push
